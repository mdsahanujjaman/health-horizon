name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🔥 IMPORTANT: backend path fixed
      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./health-horizon
          file: ./health-horizon/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/health-horizon-backend:latest

      # frontend stays same
      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/health-horizon-frontend:latest