services:
  # Database Service
  postgres:
    image: postgres:15
    container_name: health-horizon-db
    environment:
      POSTGRES_DB: health_horizon
      POSTGRES_USER: healthuser
      POSTGRES_PASSWORD: healthpass
    ports:
      - "5433:5432"
    volumes:
      - health_horizon_db_v2:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U healthuser" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  # Machine Learning Service
  ml-service:
    build:
      context: ./health-horizon/ml-service
      dockerfile: Dockerfile
    container_name: health-horizon-ml
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    networks:
      - default

  # Backend Service (Node.js)
  backend:
    build:
      context: ./health-horizon
      dockerfile: Dockerfile
    container_name: health-horizon-backend
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=health_horizon
      - DB_USER=healthuser
      - DB_PASSWORD=healthpass
      - ML_SERVICE_URL=http://ml-service:5000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  # Frontend Service (Vite + Nginx)
  frontend:
    build:
      context: ./health-horizon-frontend
      dockerfile: Dockerfile
    container_name: health-horizon-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - default
    restart: always

volumes:
  health_horizon_db_v2:


networks:
  default:
    driver: bridge
